server:
  port: 8080

spring:
  cloud:
    gateway:
      httpclient:
        pool:
          max-connections: 500
          max-idle-timeout: 60s
        connect-timeout: 200
        response-timeout: 500
  data:
    redis:
      cluster:
        nodes: ${REDIS_CLUSTER_NODES:redis-cluster:6379}
      timeout: 100ms
      lettuce:
        pool:
          max-active: 200
          max-idle: 50

gateway:
  auth:
    jwt-secret-key: ${JWT_SECRET_KEY}
    jwt-algorithm: HS256
    exclude-paths:
      - /api/v1/auth/login
      - /api/v1/auth/register
      - /api/v1/auth/refresh
      - /api/v1/auth/login/oauth
    blacklist:
      redis-timeout: 50ms
      degrade-on-failure: true
  ratelimit:
    enabled: true
    default-limit: 300
    default-window: 1s
    routes:
      - path: /api/v1/auth/**
        limit: 20
      - path: /api/v1/users/**
        limit: 200
    degrade-on-failure: true
  circuit-breaker:
    ingress:
      cpu-threshold: 0.8
      memory-threshold: 0.85
      sample-interval: 5s
      trigger-count: 3
      recover-count: 3

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 100
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 500ms
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 10
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      user-service:
        base-config: default

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true