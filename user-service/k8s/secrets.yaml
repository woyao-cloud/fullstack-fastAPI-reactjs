# Secrets（示例值，生产环境需替换）
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secrets
type: Opaque
stringData:
  database-url: "postgresql+asyncpg://user_service:change-me-in-production@postgres:5432/user_service"
  redis-url: "redis://redis:6379/0"
  jwt-secret: "change-me-in-production-use-a-strong-random-key"
  config-encryption-key: "change-me-in-production-must-be-32-chars-long"
  postgres-password: "change-me-in-production"
