# 后端 Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-backend
  labels:
    app: user-service
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-service
      tier: backend
  template:
    metadata:
      labels:
        app: user-service
        tier: backend
    spec:
      containers:
        - name: backend
          image: user-service-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: user-service-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: user-service-secrets
                  key: redis-url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: user-service-secrets
                  key: jwt-secret
            - name: CONFIG_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: user-service-secrets
                  key: config-encryption-key
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: CACHE_ENABLED
              value: "true"
            - name: CONFIG_CACHE_ENABLED
              value: "true"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-service-backend
  labels:
    app: user-service
    tier: backend
spec:
  selector:
    app: user-service
    tier: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
