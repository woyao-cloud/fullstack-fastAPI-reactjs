# 前端 Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-frontend
  labels:
    app: user-service
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
      tier: frontend
  template:
    metadata:
      labels:
        app: user-service
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: user-service-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE
              value: "/api/v1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: user-service-frontend
  labels:
    app: user-service
    tier: frontend
spec:
  selector:
    app: user-service
    tier: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
